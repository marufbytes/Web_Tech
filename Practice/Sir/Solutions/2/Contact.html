<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <form action="">
        <fieldset>
            <legend>Personal Information</legend>
            <table>
                <tr>
                    <td><label for="">Name: </label></td>
                    <td><input type="text"></td>
                </tr>
                <tr>
                    <td><label for="">Email: </label></td>
                    <td><input type="email"></td>
                </tr>
                <tr>
                    <td><label for="">Gender</label></td>
                    <td><input type="radio" name="gender" value="m" id="ma">Male</td>
                    <td><input type="radio"  name="gender" value="f" id="fe">Female</td>
                </tr>
                <tr>
                    <td><label for="">Course: </label></td>
                    <td><input type="checkbox" name="course" id="1"> Web Tech
                        <input type="checkbox" name="course" id="2"> Micro
                    </td>
                </tr>
                <tr>
                    <td><label for="">Department:</label></td>
                    <td><select name="Department" id="dept">
                        <option value="CSE">CSE</option>
                        <option value="EEE">EEE</option>
                        <option value="Architechture">Architechture</option>
                    </select></td>
                </tr>


            </table>
        </fieldset>
    </form>
    
</body>
</html>
